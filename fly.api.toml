# Fly.io configuration for API Server
app = "nodeflare-api"
primary_region = "nrt"

[build]
  dockerfile = "docker/Dockerfile.api"

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8080"
  API_URL = "https://nodeflare-api.fly.dev"
  RUST_LOG = "info"
  ENVIRONMENT = "production"
  TRUST_PROXY_HEADERS = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Health check - automatically restart if unresponsive
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
