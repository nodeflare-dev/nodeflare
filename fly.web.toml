# Fly.io configuration for Web Frontend
app = "mcp-cloud-web"
primary_region = "nrt"

[build]
  dockerfile = "apps/web/Dockerfile"
  [build.args]
    API_URL = "http://nodeflare-api.internal:8080"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
