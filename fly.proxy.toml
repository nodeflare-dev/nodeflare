# Fly.io configuration for Proxy Gateway
app = "mcp-cloud-proxy"
primary_region = "nrt"

[build]
  dockerfile = "docker/Dockerfile.proxy"

[env]
  PROXY_HOST = "0.0.0.0"
  PROXY_PORT = "8081"
  PROXY_BASE_DOMAIN = "nodeflare.tech"
  API_URL = "https://nodeflare-api.fly.dev"
  RUST_LOG = "info"
  # Semantic search (search_tools). GEMINI_API_KEY is a secret; these are plain config.
  EMBEDDING_MODEL = "gemini-embedding-001"
  EMBEDDING_DIMENSIONS = "768"
  # Code-execution mode limits (PROXY_CODE_RUNNER_URL / callback base are secrets).
  PROXY_CODE_TIMEOUT_SECS = "15"
  PROXY_CODE_MAX_TOOL_CALLS = "50"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
