# Fly.io configuration for the sandboxed code runner (code-execution mode).
# Deploy: fly deploy -c fly.code-runner.toml
app = "mcp-code-runner"
primary_region = "nrt"

[build]
  dockerfile = "services/code-runner/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Always keep one machine running: the proxy reaches the runner over `.internal`
  # (direct, no fly-proxy), which does NOT auto-start a stopped machine. Scale-to-zero
  # can be restored later by switching the proxy to a `.flycast` address.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

# Slightly larger VM: each request spawns a short-lived Deno sandbox subprocess.
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
