# Fly.io configuration for the sandboxed code runner (code-execution mode).
# Deploy: fly deploy -c fly.code-runner.toml
app = "mcp-code-runner"
primary_region = "nrt"

[build]
  dockerfile = "services/code-runner/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle; Fly wakes a machine on the next request.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

# Slightly larger VM: each request spawns a short-lived Deno sandbox subprocess.
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
